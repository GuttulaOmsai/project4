<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 25px;
        }

        /* Navigation Sidebar */
        .sidebar {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .nav-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
        }

        .nav-btn.active {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: bold;
        }

        /* Main Content Viewport */
        .main-viewport {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Mimic Panel */
        .mimic-panel {
            background-color: #020617;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .mimic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .reactor-id {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1rem;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
        }

        .live-status-pill {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-status-pill::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .animation-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 15px 0;
            flex-grow: 1;
        }

        .vessel-graphic {
            width: 100px;
            height: 120px;
            border: 3px solid #94a3b8;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vessel-fluid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(56, 189, 248, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            transition: all 0.5s ease;
        }

        .vessel-fluid.agitating {
            animation: wave 1s infinite linear;
        }

        @keyframes wave {
            0%, 100% { transform: skewY(0deg); }
            50% { transform: skewY(3deg); }
        }

        .vessel-label {
            position: relative;
            z-index: 10;
            font-size: 0.75rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .param-card {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .param-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .param-value {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--text-main);
            margin-top: 4px;
        }

        .alert-box {
            background-color: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
            color: #fca5a5;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-weight: 500;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-box.warning {
            background-color: rgba(251, 191, 36, 0.15);
            border: 1px solid var(--accent-amber);
            color: #fde047;
        }

        .process-details-section {
            margin-top: 35px;
        }

        .process-details-section h2 {
            font-size: 1.6rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-tertiary);
            padding-bottom: 8px;
        }

        .step-block {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-blue);
        }

        .step-block h4 {
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            font-family: monospace;
        }

        .sub-steps-list {
            list-style: none;
            padding-left: 5px;
        }

        .sub-steps-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .sub-steps-list li::before {
            content: "•";
            color: var(--accent-blue);
            font-weight: bold;
            position: absolute;
            left: 0;
            top: 0;
            font-size: 1.2rem;
        }

        .highlight-text {
            color: var(--accent-amber);
            font-weight: 600;
        }

        .highlight-green {
            color: var(--accent-green);
            font-weight: 600;
        }

        .material-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .material-table th, .material-table td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }

        .material-table th {
            background-color: var(--bg-tertiary);
            color: var(--accent-blue);
        }

        .material-table tr:nth-child(even) {
            background-color: rgba(255,255,255,0.02);
        }

        .decision-block {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: filter 0.2s;
        }

        .action-btn.confirm { background-color: var(--accent-green); color: #000; }
        .action-btn.reject { background-color: var(--accent-red); color: #fff; }
        .action-btn:hover { filter: brightness(1.1); }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                width: 100%;
                max-height: none;
            }
        }
    </style>
</head>

                    { label: "Distillation Temp Limit", value: "NMT 10°C" },
                    { label: "Target Concentration Vol", value: "~2.5 Volumes" },
                    { label: "Zamalya Dilution Charge", value: "Process Volume Chaser" },
                    { label: "System Atmosphere", value: "Vacuum Controlled" }
                ],
                alerts: [
                    { type: 'danger', text: "CRITICAL BATCH LIMIT: Distillation temperature must not exceed 10°C (NMT 10°C) under vacuum to prevent degradation of the cleaved peptide product." }
                ],
                materials: [
                    { name: "Neutralized Product Fluid", factor: "1 Lot Volume", qty: "Full liquid run from Page 16 operations" },
                    { name: "Zamalya (Dilution Strip)", factor: "Process Necessity", qty: "Chaser additions to control residual solvent levels" }
                ],
                steps: [
                    {
                        title: "1. Low-Temperature Vacuum Concentration",
                        details: [
                            "Transfer the combined neutralized liquid out of the neutralization vessel directly into concentration reactor units.",
                            "Engage full system vacuum lines and carefully distil off solvents, keeping internal mass temperature safely at <span class='highlight-text'>NMT 10°C</span>.",
                            "Continue distillation run until the batch mass concentrates down to a target terminal residue profile of <span class='highlight-text'>~2.5 volumes</span>."
                        ]
                    },
                    {
                        title: "2. Solvent Displacement Sweeps",
                        details: [
                            "Introduce a fresh dilution charge of <span class='highlight-text'>Zamalya</span> solvent into the concentrated core fluid inside concentration reactor.",
                            "Re-engage vacuum systems and repeat distillation at <span class='highlight-text'>NMT 10°C</span> down to <span class='highlight-text'>~2.5 volumes</span> to strip residual reaction components.",
                            "Pump the completed liquid core down towards precipitation reactor lines."
                        ]
                    }
                ]
            },
            'page-18': {
                title: "DOCUMENT PAGE 18: Stage II - 2-Lots Combined Precipitation",
                vessel: "303SSR-C 4010/4011",
                vesselType: "Stainless Steel Precipitation Reactor",
                status: "Precipitation Active",
                fluidHeight: "75%",
                fluidColor: "rgba(251, 191, 36, 0.4)",
                agitating: true,
                params: [
                    { label: "Combined Lot Strategy", value: "2 Lots Blended Together" },
                    { label: "Zamalya Anti-Solvent", value: "325 Lts" },
                    { label: "n-Heptane Anti-Solvent", value: "325 Lts" },
                    { label: "Chilled Settle Temp", value: "10 ± 5°C" }
                ],
                alerts: [
                    { type: 'warning', text: "ADDITION RATE WATCH: Addition of the concentrated product solution must be uniform and run for NMT 1 hour." },
                    { type: 'danger', text: "GUMMING HAZARD: Accelerated transfer rates increase the risk of gum formation and severe filtration blockages." }
                ],
                materials: [
                    { name: "Zamalya (Anti-Solvent Core)", factor: "5.0000", qty: "325 Lts" },
                    { name: "n-Heptane (Co-Anti-Solvent)", factor: "5.0000", qty: "325 Lts" }
                ],
                steps: [
                    {
                        title: "1. Anti-Solvent Bed Preparation",
                        details: [
                            "Charge <span class='highlight-text'>Zamalya (325 Lts)</span> and <span class='highlight-text'>n-Heptane (325 Lts)</span> directly into precipitation reactor. Engage paddle agitator blades.",
                            "Cool the mixed solvent anti-solvent matrix, stabilizing internal temperature profile safely to <span class='highlight-text'>10 ± 5°C</span>."
                        ]
                    },
                    {
                        title: "2. Product Crystallization Addition",
                        details: [
                            "Slowly pump the concentrated core solution (blending 2 active lots from concentration reactor) into the anti-solvent matrix at 10 ± 5°C. Control transfer time to run uniformly for <span class='highlight-text'>NMT 1 hour</span>.",
                            "Observe crystal precipitation closely. Stir the slurry mass continuously for <span class='highlight-text'>NLT 30 minutes</span> at 10 ± 5°C to complete crystal maturation, then prepare lines for filter delivery."
                        ]
                    }
                ]
            },
            'page-19': {
                title: "DOCUMENT PAGE 19: Stage II - 4-Lots Nutsche Filtration & Final Release",
                vessel: "303ANF-C 4001/4002",
                vesselType: "Agitated Nutsche Filter & Dryer",
                status: "Cake Isolation & Drying",
                fluidHeight: "20%",
                fluidColor: "rgba(74, 222, 128, 0.2)",
                agitating: false,
                params: [
                    { label: "Lot Consolidation", value: "4 Lots Combined (Full Batch)" },
                    { label: "Filter Liquid Temp", value: "10 ± 5°C" },
                    { label: "System Vacuum Target", value: "Minimum 600 mmHg" },
                    { label: "Drying Temperature", value: "Below 35 ± 5°C" }
                ],
                alerts: [
                    { type: 'warning', text: "QC SAMPLE HOLD: Maintain cake under a light nitrogen blanket (no vacuum) while waiting for TFA by LC testing results." },
                    { type: 'danger', text: "OOS PROCEDURE: If TFA content by LC does not comply, re-wash wet cake with a 1:1 n-Heptane/Zamalya mix until it meets specs." }
                ],
                materials: [
                    { name: "Zamalya (Combined Wash)", factor: "10 × 2.5000", qty: "10 × 325 Lts" },
                    { name: "n-Heptane (Combined Wash)", factor: "10 × 2.5000", qty: "10 × 325 Lts" }
                ],
                steps: [
                    {
                        title: "1. Consolidated Cake Cake Isolation & QC Testing",
                        details: [
                            "Receive slurry mass from precipitation reactor into Nutsche Filter (combining a total of 4 analytical lots). Filter liquor out to waste lines under nitrogen at 10 ± 5°C.",
                            "Wash wet filter cake with a pre-cooled solution of Zamalya and n-Heptane at 20 ± 5°C. Stir cake for NLT 30 minutes before pulling liquid down to waste lines.",
                            "Pull solid sample core and submit to QC laboratory for <span class='highlight-green'>TFA content by LC</span> analysis. Hold cake under static nitrogen during testing."
                        ]
                    },
                    {
                        title: "2. Thermal Drying & Final Release Packing",
                        details: [
                            "Upon receiving a passing QC result, engage system vacuum lines to achieve a minimum pressure of <span class='highlight-text'>600 mmHg</span>.",
                            "Initiate hot water grid circulation to dry product cake below <span class='highlight-text'>35 ± 5°C</span>. Run until intermediate analytical testing confirms residual solvents are <span class='highlight-text'>NMT 2%</span>.",
                            "Cool the system, break vacuum with nitrogen gas, and unload finished <span class='highlight-green'>Jaya-II (Dry) material (~64 Kgs from 4 combined lots)</span> into labeled storage containers."
                        ]
                    }
                ]
            }
        };

        function switchStage(stageKey) {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const clickedBtn = Array.from(buttons).find(btn => btn.getAttribute('onclick').includes(stageKey));
            if (clickedBtn) clickedBtn.classList.add('active');

            const data = processDatabase[stageKey];
            const viewport = document.getElementById('stage-viewport');

            let materialsHTML = '';
            if (data.materials && data.materials.length > 0) {
                materialsHTML = `
                    <table class="material-table">
                        <thead>
                            <tr>
                                <th>Raw Material / Operational Input</th>
                                <th>Factor Reference</th>
                                <th>Quantity (Qty)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.materials.map(m => `
                                <tr>
                                    <td><strong>${m.name}</strong></td>
                                    <td>${m.factor}</td>
                                    <td><span class="highlight-text">${m.qty}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            const paramsHTML = data.params.map(p => `
                <div class="param-card">
                    <div class="param-label">${p.label}</div>
                    <div class="param-value">${p.value}</div>
                </div>
            `).join('');

            const alertsHTML = data.alerts.map(a => `
                <div class="alert-box ${a.type === 'warning' ? 'warning' : ''}">
                    <div class="alert-item">
                        <span>⚠️</span>
                        <span><strong>[CRITICAL PARAMETER WATCH]:</strong> ${a.text}</span>
                    </div>
                </div>
            `).join('');

            const stepsHTML = data.steps.map(s => `
                <div class="step-block">
                    <h4>
                        <span>${s.title}</span>
                        <span class="item-badge">IN-PROCESS PARAMETER CHECK</span>
                    </h4>
                    <ul class="sub-steps-list">
                        ${s.details.map(d => `<li>${d}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            viewport.innerHTML = `
                <div class="mimic-panel">
                    <div class="mimic-header">
                        <div>
                            <h2 style="color: var(--accent-blue); font-size: 1.4rem;">${data.title}</h2>
                            <span class="reactor-id">VESSEL: ${data.vessel}</span>
                            <span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 10px;">Type: ${data.vesselType}</span>
                        </div>
                        <div class="live-status-pill">${data.status}</div>
                    </div>

                    <div class="animation-container">
                        <div class="vessel-graphic">
                            <div class="vessel-fluid ${data.agitating ? 'agitating' : ''}" style="height: ${data.fluidHeight}; background: ${data.fluidColor};"></div>
                            <div class="vessel-label">${data.vessel.split(' ')[0]}</div>
                        </div>
                    </div>

                    <div class="dashboard-grid">
                        ${paramsHTML}
                    </div>
                </div>

                ${alertsHTML}

                ${materialsHTML}

                <div class="process-details-section">
                    <h2>DETAILED PROCESS</h2>
                    ${stepsHTML}
                </div>


            `;
        }

        window.onload = function() {
            switchStage('page-3');
        };
    </script>
</body>
</html>
